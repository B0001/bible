name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e '.[dev]'
      - name: Download NLTK data
        run: python -m nltk.downloader stopwords
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest

  test-lexical:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install with lexical extra
        run: pip install -e '.[dev,lexical]'
      - name: Download NLTK data
        run: python -m nltk.downloader stopwords
      - name: Test lexical
        run: pytest -m lexical

  test-semantic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install with semantic extra
        run: pip install -e '.[dev,semantic]'
      - name: Download NLTK data
        run: python -m nltk.downloader stopwords
      - name: Download spaCy model
        run: python -m spacy download en_core_web_md
      - name: Test semantic
        run: pytest -m semantic

  # Builds the static reader (site/) and deploys to GitHub Pages on main.
  # Converter/network failures fail this job only — test jobs are independent.
  deploy-pages:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e .
      - name: Download NLTK data
        run: python -m nltk.downloader stopwords
      - name: Fetch Bible texts
        run: |
          mkdir -p data
          curl -sf https://raw.githubusercontent.com/tushortz/variety-bible-text/master/bibles/nasb.txt -o data/nasb.txt
          python scripts/convert_wlc.py
          python scripts/convert_gnt.py
          python scripts/convert_delitzsch_nt.py
          for t in valera luther1545 ls1910 synodal almeida riveduta statenvertaling arabicsv; do
            python scripts/convert_getbible.py --translation "$t"
          done
      - name: Export static site data
        run: python scripts/export_static.py
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v5
